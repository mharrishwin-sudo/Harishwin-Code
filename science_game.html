<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Matter Morph Lab</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            background: #f0f8ff; 
            margin: 0; 
            overflow: hidden;
        }
        #container {
            margin-top: 20px;
        }
        canvas { 
            background: #fff; 
            border: 5px solid #333; 
            border-radius: 15px;
            cursor: pointer;
        }
        .controls {
            margin: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 10px;
            border: none;
            margin: 10px;
            transition: transform 0.1s;
        }
        #heat-btn { background: #ff4d4d; color: white; }
        #cool-btn { background: #4da6ff; color: white; }
        button:active { transform: scale(0.95); }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        #status { font-size: 24px; font-weight: bold; color: #e67e22; }
    </style>
</head>
<body>

    <h1>Matter Morph Lab! ⚗️</h1>
    <div id="status">State: SOLID</div>
    <div class="controls">
        <button id="cool-btn">❄️ Freeze It!</button>
        <button id="heat-btn">🔥 Heat It Up!</button>
    </div>
    <canvas id="labCanvas"></canvas>

<script>
    const canvas = document.getElementById('labCanvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('status');
    
    canvas.width = 500;
    canvas.height = 400;

    let temp = 10; // Starting temperature
    let particles = [];

    class Particle {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = Math.random() * (canvas.width - 40) + 20;
            this.y = Math.random() * (canvas.height - 40) + 20;
            this.size = 10;
        }
        update() {
            // Speed depends on temperature
            let speed = (temp / 20);
            if (temp < 20) speed = 0.5; // Solid jitter

            this.x += (Math.random() - 0.5) * speed;
            this.y += (Math.random() - 0.5) * speed;

            // Keep inside box
            if (this.x < 0) this.x = canvas.width;
            if (this.x > canvas.width) this.x = 0;
            if (this.y < 0) this.y = canvas.height;
            if (this.y > canvas.height) this.y = 0;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            // Color changes with temperature
            if (temp < 30) ctx.fillStyle = '#3498db'; // Cold Blue
            else if (temp < 70) ctx.fillStyle = '#2ecc71'; // Warm Green
            else ctx.fillStyle = '#e74c3c'; // Hot Red
            ctx.fill();
            ctx.closePath();
        }
    }

    // Create 30 particles
    for (let i = 0; i < 30; i++) {
        particles.push(new Particle());
    }

    function updateGame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Determine State
        let state = "SOLID";
        if (temp >= 40 && temp < 80) state = "LIQUID";
        if (temp >= 80) state = "GAS";
        statusText.innerText = "State: " + state;

        particles.forEach(p => {
            p.update();
            p.draw();
        });

        requestAnimationFrame(updateGame);
    }

    document.getElementById('heat-btn').onclick = () => {
        if (temp < 150) temp += 10;
    };

    document.getElementById('cool-btn').onclick = () => {
        if (temp > 5) temp -= 10;
    };

    updateGame();
</script>
</body>
</html>
